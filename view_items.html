<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Campus Lost & Found - View Items</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            width: 90%;
            margin: auto;
            padding: 20px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-box input,
        .search-box select {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-right: 5px;
        }

        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            color: white;
            display: inline-block;
        }

        .btn-add {
            background: #27ae60;
        }

        .btn-search {
            background: #3498db;
        }

        .btn-edit {
            background: #f39c12;
        }

        .btn-delete {
            background: #e74c3c;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 15px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
        }

        .meta {
            font-size: 14px;
            color: #444;
            margin-top: 10px;
        }

        .actions {
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
        }

        form.inline {
            display: inline;
        }
    </style>
</head>

<body>

<header>
    <h1>Lost & Found Items</h1>
</header>

<div class="container">

    <div class="top-bar">

        <a href="/add" class="btn btn-add">+ Add Item</a>

        <form method="GET" action="/view_items" class="search-box">

            <input type="text" name="search" placeholder="Search items..."
                   value="{{ request.args.get('search', '') }}">

            <select name="category">
                <option value="">All Categories</option>
                {% for cat in categories %}
                    <option value="{{ cat }}"
                        {% if request.args.get('category') == cat %}selected{% endif %}>
                        {{ cat }}
                    </option>
                {% endfor %}
            </select>

            <button type="submit" class="btn btn-search">Search</button>

        </form>

    </div>

    <div class="grid">

        {% for item in items %}
        <div class="card">

            {% if item.image %}
                <img src="{{ url_for('static', filename='uploads/' + item.image) }}">
            {% else %}
                <img src="{{ url_for('static', filename='uploads/default.png') }}">
            {% endif %}

            <h3>{{ item.title }}</h3>

            <div class="meta">
                <p><b>Reg No:</b> {{ item.reg_no }}</p>
                <p><b>Category:</b> {{ item.category }}</p>
                <p><b>Description:</b> {{ item.description }}</p>
                <p><b>Location:</b> {{ item.location }}</p>
                <p><b>Contact:</b> {{ item.contact }}</p>
            </div>

            <div class="actions">

                <a href="/edit/{{ item.id }}" class="btn btn-edit">Edit</a>

                <form method="POST" action="/delete/{{ item.id }}" class="inline">
                    <button type="submit" class="btn btn-delete"
                            onclick="return confirm('Are you sure?')">
                        Delete
                    </button>
                </form>

            </div>

        </div>
        {% endfor %}

    </div>

</div>

</body>
</html>
