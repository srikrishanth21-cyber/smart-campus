<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Campus Lost & Found</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            width:420px;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            margin-bottom:20px;
            color:#333;
        }

        input,select{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
        }

        input[type=file]{
            border:none;
            padding:8px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:none;
            border-radius:8px;
            background:#007BFF;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        .view-btn{
            display:block;
            text-align:center;
            margin-top:15px;
            text-decoration:none;
            background:green;
            color:white;
            padding:12px;
            border-radius:8px;
        }

        .view-btn:hover{
            background:darkgreen;
        }

    </style>

</head>
<body>

<div class="container">

    <h1>Lost & Found Portal</h1>

    <form method="POST" enctype="multipart/form-data">

        <input
            type="text"
            name="name"
            placeholder="Your Name"
            required
        >

        <input
            type="text"
            name="item"
            placeholder="Lost Item"
            required
        >

        <select name="category" required>

            <option value="">Select Category</option>

            <option>Mobile</option>
            <option>Laptop</option>
            <option>Wallet</option>
            <option>ID Card</option>
            <option>Bag</option>
            <option>Keys</option>
            <option>Watch</option>
            <option>Book</option>
            <option>Bottle</option>
            <option>Other</option>

        </select>

        <input
            type="text"
            name="contact"
            placeholder="Contact Number"
            required
        >

        <label><b>Upload Item Image</b></label>

        <input
            type="file"
            name="image"
            accept="image/*"
        >

        <button type="submit">
            Submit
        </button>

    </form>

    <a href="/view" class="view-btn">
        View Lost Items
    </a>

</div>

</body>
</html>
